<!-- 2) გააკეთე სათაური დიდი ზომის, მუქი ლურჯი ფერის და ქვემოთ დაუმატე თხელი საზღვარი. -->

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Large Title with Border</title>
    <style>
        /* სათაურის სტილი */
        h1 {
            font-size: 40px; /* დიდი ზომა */
            color: #2c3e50; /* მუქი ლურჯი ფერი */
            text-align: center; /* ტექსტის ცენტრში განლაგება */
            margin-bottom: 20px; /* საზღვარი და სათაურს შორის სივრცე */
            border-bottom: 2px solid #2c3e50; /* თხელი საზღვარი ქვემოთ */
            padding-bottom: 10px; /* საზღვრისა და ტექსტის შორის სივრცე */
        }
    </style>
</head>
<body>

<h1>დიდი სათაური მუქი ლურჯი ფერით</h1>

</body>
</html>
