<!-- 3) შექმენი ბლოკი ღია ნაცრისფერი ფონის, მუქი ტექსტის და სქელი ლურჯი საზღვრის კომბინაციით. -->

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Gray Block with Blue Border</title>
    <style>
        /* ბლოკის სტილი */
        .colored-block {
            background-color: #dcdcdc; /* ღია ნაცრისფერი ფონი */
            color: #2c3e50; /* მუქი ტექსტი */
            padding: 20px;
            font-size: 18px;
            border: 5px solid #3498db; /* სქელი ლურჯი საზღვარი */
            border-radius: 8px; /* რბილი კუთხეები */
            width: 80%;
            max-width: 600px;
            margin: 30px auto; /* განლაგება ცენტრში */
        }
    </style>
</head>
<body>

<div class="colored-block">
    ეს არის ბლოკი ღია ნაცრისფერი ფონის, მუქი ტექსტის და სქელი ლურჯი საზღვრის კომბინაციით.
</div>

</body>
</html>
