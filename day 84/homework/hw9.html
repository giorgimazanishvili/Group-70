<!-- 
9) შექმენი ბლოკი, რომელსაც აქვს მწვანე ფონი, თეთრი ტექსტი და სქელი საზღვარი იმავე ფერის ტონალობაში. -->

<!DOCTYPE html>
<html lang="ka">
<head>
<style>
.block {
  background-color: green;      /* მწვანე ფონი */
  color: white;                 /* თეთრი ტექსტი */
  border: 5px solid darkgreen;  /* სქელი საზღვარი იმავე ტონალობაში */
  padding: 20px;
  width: 250px;
  text-align: center;
}
</style>
</head>
<body>

<div class="block">
  ეს არის მწვანე ბლოკი თეთრი ტექსტით.
</div>

</body>
</html>
