<!-- 6) გააკეთე ტექსტი, რომელიც მობილურზე პატარაა, ხოლო დიდ ეკრანზე უფრო დიდი ხდება. -->

<!DOCTYPE html>
<html lang="ka">
<head>
<style>
.text {
  font-size: 16px; /* მობილურისთვის პატარა ტექსტი */
}

/* როცა ეკრანი 768px-ზე დიდია */
@media (min-width: 768px) {
  .text {
    font-size: 28px; /* დიდ ეკრანზე უფრო დიდი ტექსტი */
  }
}
</style>
</head>
<body>

<p class="text">ეს არის ტექსტი, რომელიც ეკრანის ზომის მიხედვით იცვლება.</p>

</body>
</html>
