<!-- 1) შექმენი ბლოკი შავი ფონის და თეთრი ტექსტის კომბინაციით. ტექსტი იყოს საშუალო ზომის და ცენტრში განლაგებული. -->

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Black Background with White Text</title>
    <style>
        /* გვერდის საერთო სტილი */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        /* ბლოკი შავი ფონისა და თეთრი ტექსტის კომბინაციით */
        .black-box {
            background-color: black;
            color: white;
            padding: 20px 40px;
            text-align: center; /* ტექსტი ცენტრში განლაგება */
            font-size: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="black-box">
    ეს არის შავი ფონისა და თეთრი ტექსტის კომბინაცია.
</div>

</body>
</html>
