<!-- 7) შექმენი ბლოკი, რომელსაც აქვს მომრგვალებული კუთხეები, თხელი ნაცრისფერი საზღვარი და ღია ფონი. -->

<!DOCTYPE html>
<html lang="ka">
<head>
<style>
.block {
  background-color: #f5f5f5;   /* ღია ფონი */
  border: 1px solid gray;      /* თხელი ნაცრისფერი საზღვარი */
  border-radius: 10px;         /* მომრგვალებული კუთხეები */
  padding: 20px;
  width: 250px;
}
</style>
</head>
<body>

<div class="block">
  ეს არის ბლოკი მომრგვალებული კუთხეებით და ღია ფონით.
</div>

</body>
</html>
