<!-- 1) შექმენი პროფილის ბარათი (profile card) რომელსაც ექნება რბილი shadow და სრულად მომრგვალებული პროფილის სურათი. -->

<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Profile Card</title>
<style>

body{
  background:#f3f4f6;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.profile-card{
  background:white;
  padding:30px;
  width:260px;
  text-align:center;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08); /* რბილი shadow */
}

.profile-img{
  width:110px;
  height:110px;
  border-radius:50%; /* სრულად მომრგვალებული სურათი */
  object-fit:cover;
  margin-bottom:15px;
}

.name{
  font-size:20px;
  font-weight:bold;
}

.job{
  color:#777;
  font-size:14px;
}

</style>
</head>
<body>

<div class="profile-card">
  <img class="profile-img" src="https://i.pravatar.cc/150" alt="profile">
  <div class="name">გიორგი მ.</div>
  <div class="job">Frontend Developer</div>
</div>

</body>
</html>
