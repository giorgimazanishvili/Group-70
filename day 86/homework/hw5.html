<!-- 5) შექმენი ბლოკი rounded კუთხეებით და ძლიერი shadow-ით, რომელიც hover-ზე ოდნავ “იწევს ზემოთ” (translate ეფექტის გამოყენებით).
 -->

<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Hover Lift Block</title>

<style>

body{
  font-family:Arial, sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:260px;
  padding:30px;
  background:white;
  border-radius:20px; /* rounded კუთხეები */
  text-align:center;

  box-shadow:0 20px 40px rgba(0,0,0,0.2); /* ძლიერი shadow */

  transition: all 0.3s ease;
}

.box:hover{
  transform:translateY(-10px); /* ზემოთ იწევს */
  box-shadow:0 25px 50px rgba(0,0,0,0.25);
}

</style>

</head>
<body>

<div class="box">
  <h3>Hover Block</h3>
  <p>მაუსის მიტანისას ბლოკი ოდნავ ზემოთ იწევა.</p>
</div>

</body>
</html>
