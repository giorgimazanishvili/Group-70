<!-- 2) გააკეთე ბარათი (card) სადაც გამოყენებულია ფონის gradient. ტექსტი უნდა იყოს მკაფიო და წაკითხვადი. -->

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ბარათი Gradient-ით</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            width: 300px;
            padding: 20px;
            background: linear-gradient(135deg, #3498db, #8e44ad);
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            color: white;
            text-align: center;
            font-size: 18px;
            box-sizing: border-box;
        }

        .card h1 {
            margin: 0;
            font-size: 24px;
        }

        .card p {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>გულახდილი ბარათი</h1>
        <p>ეს არის ბარათი, რომელიც გამოიყენებს gradient ფონს. ტექსტი მკაფიოდ ჩანს და კარგად იკითხება.</p>
    </div>

</body>
</html>
