<!-- 1) შექმენი ბლოკი რომელსაც ექნება ჩრდილი (shadow). სცადე სხვადასხვა ზომის ჩრდილები და შეადარე ვიზუალურად. -->

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ბლოკები ჩრდილით</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
        }

        .block {
            width: 200px;
            height: 200px;
        }

        .block1 {
            background-color: #3498db;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.5);
        }

        .block2 {
            background-color: #e74c3c;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .block3 {
            background-color: #2ecc71;
            box-shadow: 15px 15px 30px rgba(0, 0, 0, 0.6);
        }

        .block4 {
            background-color: #9b59b6;
            box-shadow: 5px 5px 0 rgba(0, 0, 0, 1);
        }

        .block5 {
            background-color: #f39c12;
            box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="block block1"></div>
        <div class="block block2"></div>
        <div class="block block3"></div>
        <div class="block block4"></div>
        <div class="block block5"></div>
    </div>

</body>
</html>
