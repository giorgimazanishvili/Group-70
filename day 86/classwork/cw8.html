<!-- 8) შექმენი flex კონტეინერი, სადაც ელემენტები განლაგდება ჰორიზონტალურად და იქნება სივრცე მათ შორის. -->

<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex კონტეინერი</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .container {
            display: flex;  /* Flexbox კონტეინერი */
            justify-content: space-between; /* სივრცე ელემენტებს შორის */
            padding: 20px;
            background-color: #3498db;
        }

        .item {
            background-color: #e74c3c;
            color: white;
            padding: 20px;
            font-size: 18px;
            border-radius: 5px;
            width: 150px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item">ელემენტი 1</div>
        <div class="item">ელემენტი 2</div>
        <div class="item">ელემენტი 3</div>
    </div>

</body>
</html>
