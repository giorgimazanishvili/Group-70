<!-- 3) შექმენი loader 5 ელემენტით (flex gap-3).
ყველას ჰქონდეს animate-pulse, მაგრამ განსხვავებული delay (გამოიყენე arbitrary value: [animation-delay:200ms] და ა.შ.).
ზომები იყოს განსხვავებული (w-2 h-2 ... w-6 h-6).
Loader იყოს ვერტიკალურად და ჰორიზონტალურად ცენტრში.
დამატებითი პირობა: dark mode-ზე ფერი შეიცვალოს (dark:bg-white). -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulse Loader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex justify-center items-center h-screen bg-gray-100 dark:bg-gray-900">

  <div class="flex gap-3">

    <div class="w-2 h-2 bg-blue-500 dark:bg-white rounded-full animate-pulse [animation-delay:0ms]"></div>
    <div class="w-3 h-3 bg-blue-500 dark:bg-white rounded-full animate-pulse [animation-delay:200ms]"></div>
    <div class="w-4 h-4 bg-blue-500 dark:bg-white rounded-full animate-pulse [animation-delay:400ms]"></div>
    <div class="w-5 h-5 bg-blue-500 dark:bg-white rounded-full animate-pulse [animation-delay:600ms]"></div>
    <div class="w-6 h-6 bg-blue-500 dark:bg-white rounded-full animate-pulse [animation-delay:800ms]"></div>

  </div>

</body>
</html>
