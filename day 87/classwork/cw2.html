<!-- 2) გაქვს ორი მასივი:

const arr1 = [1, 2];
const arr2 = [3, 4];

გააერთიანე ისინი ერთ მასივად spread-ის გამოყენებით. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merge Arrays with Spread</title>
</head>
<body>

<h2>Merge Arrays Example</h2>
<p id="result"></p>

<script>
    const arr1 = [1, 2];
    const arr2 = [3, 4];

    const mergedArray = [...arr1, ...arr2];

    document.getElementById("result").textContent =
        "Merged Array: " + mergedArray.join(", ");
</script>

</body>
</html>
